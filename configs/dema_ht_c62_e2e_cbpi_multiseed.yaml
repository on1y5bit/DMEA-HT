c27:
  c27_run_dir: /home/linruixin/chen/project/DMEA-HT/runs/dema_ht_c27_vtme_multiseed
  mean_validation_auc: 0.8822996831145314

c61:
  hypothesis: continuous_biochemical_patient_instance_fusion
  source: c61_predictive_path_initialized_from_c61_checkpoint
  run_dir: /home/linruixin/chen/project/DMEA-HT/runs/dema_ht_c61_cbpi_multiseed
  stream_order: [raw_image, raw_text, raw_bio, aligned_image, aligned_text, aligned_bio]
