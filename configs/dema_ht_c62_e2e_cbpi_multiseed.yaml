  evidence_source_modules: 0.10
  c61_task_specific_path: 1.00

loss:
  bce_only: true

evaluation:
  test_reporting_only: true
  auprc: false

deployment:
  one_checkpoint: true
  one_model: true
  one_forward: true
  ensemble: false
