training:
  seeds: [0, 42, 3407]
  batch_size: 4
  effective_batch_size: 4
  gradient_accumulation_steps: 1
  lr: 0.0001
  weight_decay: 0.0001
  epochs: 40
  patience: 10
  primary_metric: val_AUC
  checkpoint_metric: val_auc
  num_workers: 2
  evaluate_test_after_validation_decision: true

learning_rate_groups:
