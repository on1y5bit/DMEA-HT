project:
  name: dmea_ht_mvp
  data_root: /data/csb/DMEA-HT/HT_2025.12_25
  manifest: /data/csb/DMEA-HT/HT_2025.12_25/manifest.jsonl
  output_dir: runs/dmea_ht_mvp

model:
  name: dmea_ht
  variant: dmea
  hidden_dim: 256
  text_vocab_size: 50000
  text_max_length: 256
  bio_dim: 32
  max_images_per_patient: 4
  image_size: 224
  dropout: 0.15
  use_patient_anchor: true
  use_evidence_role: true
  use_discordance: true

training:
  seeds: [0, 42, 3407]
  batch_size: 8
  lr: 0.0001
  weight_decay: 0.0001
  epochs: 30
  patience: 8
  primary_metric: val_AUC
  num_workers: 2

loss:
  cls_weight: 1.0
  role_align_weight: 0.0
  discordance_weight: 0.0

shortcut_audit:
  enabled: true
  variables:
    - n_images
    - n_visits
    - has_bio
    - bio_missing_count
    - report_length
    - source_folder
    - padding_count

matching:
  enabled: true
  trigger_if_shortcut_auc_gt: 0.70
  trigger_if_spearman_abs_gt: 0.30
  method: bin_reweighting
  variables:
    - n_visits
    - n_images
    - has_bio
    - bio_missing_count
  allow_downsample_negative: true
  preserve_all_positive_if_possible: true

