project:
  name: dmea_ht_distmatch
  data_root: /data/csb/DMEA-HT/HT_2025.12_25
  manifest: /data/csb/DMEA-HT/HT_2025.12_25/manifest_distmatch.jsonl
  output_dir: runs/dmea_ht_distmatch

model:
  name: dmea_ht
  variant: dmea
  hidden_dim: 256
  text_vocab_size: 50000
  text_max_length: 256
  bio_dim: 7
  max_images_per_patient: 28
  image_size: 224
  dropout: 0.15
  use_patient_anchor: true
  use_evidence_role: true
  use_discordance: true

training:
  seeds: [0, 42, 3407]
  batch_size: 4
  lr: 0.0001
  weight_decay: 0.0001
  epochs: 30
  patience: 8
  primary_metric: val_AUC
  num_workers: 2

loss:
  cls_weight: 1.0
  role_align_weight: 0.0
  discordance_weight: 0.0

shortcut_audit:
  enabled: true
  variables:
    - n_images
    - n_visits
    - selected_n_visits
    - raw_n_visits
    - used_images
    - raw_n_images
    - has_bio
    - bio_missing_count
    - report_length
    - image_padding_count
    - source_folder

