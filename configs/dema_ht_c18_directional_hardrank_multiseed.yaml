phase: c18

project:
  name: dema_ht_c18_directional_hardrank_multiseed
  data_root: /data/csb/DMEA-HT/HT_2025.12_25
  manifest: /data/csb/DMEA-HT/HT_2025.12_25/manifest_distmatch_structmatch_evidence_v2_c13_temporal_focus.jsonl
  output_dir: runs/dema_ht_c18_directional_hardrank_multiseed

model:
  name: dmea_ht
  variant: dmea
  hidden_dim: 256
  text_vocab_size: 50000
  text_max_length: 256
  bio_dim: 7
  max_images_per_patient: 28
  image_size: 224
  dropout: 0.15
  mea_num_heads: 4

c18:
  variant: directional_hardrank
  base_checkpoint: /home/linruixin/chen/project/DMEA-HT/runs/dmea_ht_v2_c13_temporal_focus_stress_seeds/checkpoints/seed_{seed}_best.pt
  init_mea_checkpoint: /home/linruixin/chen/project/DMEA-HT/runs/dema_ht_c17_formal_multiseed/checkpoints/seed_{seed}_best.pt
  delta_max: 0.50

training:
  seeds: [0, 42, 3407]
  batch_size: 4
  lr: 0.0001
  weight_decay: 0.0001
  epochs: 30
  patience: 8
  primary_metric: val_AUC
  num_workers: 2
  evaluate_test: true

loss:
  c18: true
  cls_weight: 1.0
  lambda_directional_residual: 0.001
  lambda_positive_preserve: 0.02
  allowed_negative_delta: 0.05
  hard_rank: true
  hard_margin_threshold: 0.50
  lambda_hard_rank: 0.01
