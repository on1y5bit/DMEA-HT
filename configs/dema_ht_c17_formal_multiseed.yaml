c17:
  base_checkpoint: /home/linruixin/chen/project/DMEA-HT/runs/dmea_ht_v2_c13_temporal_focus_stress_seeds/checkpoints/seed_{seed}_best.pt
  init_mea_checkpoint: /home/linruixin/chen/project/DMEA-HT-c16-mea-impl/runs/dmea_ht_v2_c16_mea_core_seed0/checkpoints/seed_0_best.pt
  delta_max: 0.50

training:
  seeds: [0, 42, 3407]
  batch_size: 4
  lr: 0.0001
  weight_decay: 0.0001
  epochs: 30
  patience: 8
  primary_metric: val_AUC
  num_workers: 2
  evaluate_test: true

loss:
  c17: true
  cls_weight: 1.0
  lambda_residual: 0.001
  lambda_positive_preserve: 0.0
  allowed_negative_delta: 0.05
  delta_max: 0.50
  state_margin_weight: 0.0
  mechanism_alignment_weight: 0.0
  role_separation_weight: 0.0
  pairwise_ranking_weight: 0.0
