phase: c38

project:
  name: dema_ht_c38_mpes_multiseed
  data_root: /data/csb/DMEA-HT/HT_2025.12_25
  manifest: /data/csb/DMEA-HT/HT_2025.12_25/manifest_distmatch_structmatch_evidence_v2_c27_visit_level.jsonl
  output_dir: runs/dema_ht_c38_mpes_multiseed
  report_dir: analysis_reports/phase_c38_dema

model:
  name: dmea_ht
  variant: c38_mpes
  hidden_dim: 256
  text_vocab_size: 50000
  text_max_length: 256
  bio_dim: 7
  max_images_per_visit: 4
  image_size: 224
  dropout: 0.10
  mea_num_heads: 4

c17:
  c17_checkpoint: /home/linruixin/chen/project/DMEA-HT/runs/dema_ht_c17_formal_multiseed/checkpoints/seed_{seed}_best.pt
  c17_run_dir: /home/linruixin/chen/project/DMEA-HT/runs/dema_ht_c17_formal_multiseed
  mean_validation_auc: 0.8696242643730194

c27:
  c27_run_dir: /home/linruixin/chen/project/DMEA-HT/runs/dema_ht_c27_vtme_multiseed
  mean_validation_auc: 0.8822996831145314

c38:
  source: frozen_c17_mechanism_evidence
  latest_history_set_partition: true
  learned_visit_score: false
  shortcut_fields_used_as_inputs: false
  trainable_parameter_limit: 50000000

training:
  seeds: [0, 42, 3407]
  batch_size: 4
  effective_batch_size: 4
  gradient_accumulation_steps: 1
  lr: 0.0001
  weight_decay: 0.0001
  epochs: 40
  patience: 10
  primary_metric: val_AUC
  checkpoint_metric: val_auc
  num_workers: 2
  evaluate_test_after_validation_decision: true

loss:
  bce_only: true

deployment:
  one_checkpoint: true
  one_model: true
  one_forward: true
  ensemble: false
