evaluation:
  test_reporting_only: true
  test_locked_until_final_contract: true
  auprc: false

deployment:
  one_checkpoint: true
  one_model: true
  one_forward: true
  ensemble: false
  prediction_averaging: false
  checkpoint_averaging: false

