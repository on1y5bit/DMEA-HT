  temporal_attention: false
  router: false
  visit_selector: false
  shortcut_fields_used_as_inputs: false
  missingness_as_classifier_feature: false

training:
  seeds: [0, 42, 3407]
  batch_size: 4
  effective_batch_size: 4
  gradient_accumulation_steps: 1
  base_lr: 0.0001
  weight_decay: 0.0005
  max_epochs: 60
  patience: 15
  primary_metric: val_AUC
  checkpoint_metric: val_auc
  num_workers: 2
  dataloader_seeded: true

learning_rate_factors:
  image_text_encoders: 0.05
  bio_source_encoder: 0.10
  evidence_projectors: 0.25
  c61_task_path: 1.00

loss:
